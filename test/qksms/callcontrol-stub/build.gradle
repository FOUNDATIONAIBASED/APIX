// Stub for com.callcontrol:datashare (removed from public repos). Optional Call Control app integration.
apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.callcontrol.datashare'
    compileSdk 33
    defaultConfig {
        minSdkVersion 21
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = "1.8"
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}
