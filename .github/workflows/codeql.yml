# Code scanning runs only after the build job succeeds (needs: build).
# Android release builds stay in android-build.yml (tags / manual).
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── Prerequisite: must pass before CodeQL runs ─────────────────────────
  build:
    name: Build (gateway server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check entrypoint
        run: node --check src/index.js

  # ── CodeQL: only runs if `build` completed successfully ────────────────
  analyze:
    name: CodeQL Analysis
    needs: build
    if: success()
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
          # Analyze only the Node gateway (package.json lives in server/)
          source-root: server
          queries: security-extended

      - name: Install dependencies (for extraction)
        working-directory: server
        run: npm ci

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
