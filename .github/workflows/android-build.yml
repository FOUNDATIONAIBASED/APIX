name: Android Build & Release

# Trigger on version tags (v1.0.0, v2.3.1, etc.) or manual dispatch
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# Allow creating releases
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Need full history for version calculation

      # ── 2. Set up JDK 17 ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Set up Gradle ──────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # ── 4. Extract version from tag ───────────────────────────────
      - name: Extract version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version=${VERSION}"        >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} (code: ${VERSION_CODE})"

      # ── 5. Make Gradle wrapper executable ─────────────────────────
      - name: Grant execute permission to gradlew
        working-directory: client
        run: chmod +x gradlew

      # ── 6. Run unit tests ─────────────────────────────────────────
      - name: Run unit tests
        working-directory: client
        run: ./gradlew test --no-daemon --stacktrace
        continue-on-error: true

      # ── 7. Build debug APK (always) ───────────────────────────────
      - name: Build debug APK
        working-directory: client
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Pandroid.versionName="${{ steps.version.outputs.version }}" \
            -Pandroid.versionCode="${{ steps.version.outputs.version_code }}"

      # ── 8. Build release APK (if signing key is configured) ───────
      - name: Build release APK
        working-directory: client
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

          # Build with signing
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.versionName="${{ steps.version.outputs.version }}" \
            -Pandroid.versionCode="${{ steps.version.outputs.version_code }}" \
            -Pandroid.storeFile="$(pwd)/keystore.jks" \
            -Pandroid.storePassword="$KEYSTORE_PASSWORD" \
            -Pandroid.keyAlias="$KEY_ALIAS" \
            -Pandroid.keyPassword="$KEY_PASSWORD"

          # Clean up keystore
          rm -f keystore.jks

      # ── 9. Build unsigned release (no keystore) ───────────────────
      - name: Build unsigned release APK
        working-directory: client
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.versionName="${{ steps.version.outputs.version }}" \
            -Pandroid.versionCode="${{ steps.version.outputs.version_code }}" \
            || echo "Release build failed (unsigned) — debug APK still available"

      # ── 10. Rename APKs with version ──────────────────────────────
      - name: Rename APK files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          find client/app/build/outputs/apk -name "*.apk" | while read f; do
            DIR=$(dirname "$f")
            BASENAME=$(basename "$f" .apk)
            if [[ "$f" != *"${VERSION}"* ]]; then
              mv "$f" "${DIR}/ApiX-Agent-${VERSION}-${BASENAME}.apk" 2>/dev/null || true
            fi
          done
          echo "APK files:"
          find client/app/build/outputs/apk -name "*.apk" -ls

      # ── 11. Upload APK artifacts ──────────────────────────────────
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apix-agent-debug-${{ steps.version.outputs.version }}
          path: client/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apix-agent-release-${{ steps.version.outputs.version }}
          path: client/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

      # ── 12. Create GitHub Release (only on tag push) ──────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "ApiX Agent ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            client/app/build/outputs/apk/**/*.apk
          body: |
            ## ApiX Agent ${{ steps.version.outputs.version }}

            ### Installation
            1. Download the APK below (use **debug** for testing, **release** for production)
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK to install
            4. Launch **ApiX Agent** and point it at your gateway server

            ### Requirements
            - Android 4.3 (Jelly Bean MR2 / API 18) or higher
            - Permissions: SMS, Phone State, Internet, Boot

            ### Server Setup
            Run the server with `./apix.sh` from the `server/` directory.
            Android devices auto-discover the server via mDNS on the same LAN.

            **Version code:** ${{ steps.version.outputs.version_code }}
            **Build:** ${{ github.sha }}
