name: Android Build & Release

# Trigger on version tags (v1.0.0, v2.3.1, etc.) or manual dispatch
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# Allow creating releases
permissions:
  contents: write

# Opt into Node 24 for JS-based actions (quiet Node 20 deprecation warnings until defaults change)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── ApiX Agent (standalone client) — JDK 17 + modern Gradle ─────────────
  build-client:
    name: Build ApiX Agent APK
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} (code: ${VERSION_CODE})"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          add-job-summary: true

      - name: Grant execute permission to gradlew
        working-directory: client
        run: chmod +x gradlew

      - name: Run unit tests
        working-directory: client
        run: ./gradlew test --no-daemon --stacktrace
        continue-on-error: true

      - name: Build debug APK
        working-directory: client
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Pandroid.versionName="${{ steps.version.outputs.version }}" \
            -Pandroid.versionCode="${{ steps.version.outputs.version_code }}"

      - name: Build release APK
        working-directory: client
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.versionName="${{ steps.version.outputs.version }}" \
            -Pandroid.versionCode="${{ steps.version.outputs.version_code }}" \
            -Pandroid.storeFile="$(pwd)/keystore.jks" \
            -Pandroid.storePassword="$KEYSTORE_PASSWORD" \
            -Pandroid.keyAlias="$KEY_ALIAS" \
            -Pandroid.keyPassword="$KEY_PASSWORD"
          rm -f keystore.jks

      - name: Build unsigned release APK
        working-directory: client
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.versionName="${{ steps.version.outputs.version }}" \
            -Pandroid.versionCode="${{ steps.version.outputs.version_code }}" \
            || echo "Release build failed (unsigned) — debug APK still available"

      - name: Rename Agent APK files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          find client/app/build/outputs/apk -name "*.apk" 2>/dev/null | while read -r f; do
            DIR=$(dirname "$f")
            BASENAME=$(basename "$f" .apk)
            if [[ "$f" != *"${VERSION}"* ]]; then
              mv "$f" "${DIR}/ApiX-Agent-${VERSION}-${BASENAME}.apk" 2>/dev/null || true
            fi
          done
          echo "Agent APK files:"
          find client/app/build/outputs/apk -name "*.apk" -ls 2>/dev/null || true

      - name: Job summary — ApiX Agent
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VCODE: ${{ steps.version.outputs.version_code }}
        run: |
          {
            echo "## 📱 ApiX Agent — build summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version name** | \`$VERSION\` |"
            echo "| **Version code** | \`$VCODE\` |"
            echo "| **Project** | \`client/\` |"
            echo "| **Tasks** | \`assembleDebug\` (+ \`assembleRelease\` when keystore configured) |"
            echo "| **JDK** | 17 (Eclipse Temurin) |"
            echo ""
            echo "### Output APKs"
          } >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          apks=(client/app/build/outputs/apk/*/*.apk)
          if ((${#apks[@]})); then
            echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
            for f in "${apks[@]}"; do
              [[ -f "$f" ]] || continue
              sz=$(du -h "$f" | cut -f1)
              echo "| \`$(basename "$f")\` | $sz |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "_No APK files found under \`client/app/build/outputs/apk\` (build may have failed)._ " >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo ""
            echo "### Artifacts"
            echo "- **Debug:** \`apix-agent-debug-${VERSION}\`"
            echo "- **Release:** \`apix-agent-release-${VERSION}\` (if produced)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apix-agent-debug-${{ steps.version.outputs.version }}
          path: client/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apix-agent-release-${{ steps.version.outputs.version }}
          path: client/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

  # ── QKSMS + ApiX gateway — JDK 17 + Gradle 7.6 / AGP 7.4 / compileSdk 33 ─
  build-qksms:
    name: Build ApiX QKSMS (gateway) APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "QKSMS build version: ${VERSION} (code: ${VERSION_CODE})"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle runs from test/qksms via working-directory on run steps (do not pass subdir as setup-gradle input).
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          add-job-summary: true

      # Space-separated list (one `packages` value). Multiline YAML mistakes break sdkmanager (single bogus package name).
      - name: Set up Android SDK (matches test/qksms compileSdk 33)
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true
          packages: 'platform-tools platforms;android-33 build-tools;33.0.2'

      - name: Grant execute permission to gradlew
        working-directory: test/qksms
        run: chmod +x gradlew

      - name: Write local.properties
        working-directory: test/qksms
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      # Debug APK does not need a keystore. For signed *release* on CI, add test/qksms/keystore
      # (e.g. decode from a secret) and set keystore_password, key_alias, key_password env — see presentation/build.gradle.

      - name: Assemble noAnalytics debug APK
        working-directory: test/qksms
        run: |
          ./gradlew :presentation:assembleNoAnalyticsDebug --no-daemon --stacktrace \
            -Pandroid.versionName="${{ steps.version.outputs.version }}" \
            -Pandroid.versionCode="${{ steps.version.outputs.version_code }}"

      - name: Rename QKSMS APK files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          find test/qksms/presentation/build/outputs/apk -name "*.apk" 2>/dev/null | while read -r f; do
            DIR=$(dirname "$f")
            BASENAME=$(basename "$f" .apk)
            if [[ "$BASENAME" != ApiX-QKSMS-* ]]; then
              mv "$f" "${DIR}/ApiX-QKSMS-${VERSION}-${BASENAME}.apk" 2>/dev/null || true
            fi
          done
          echo "QKSMS APK files:"
          find test/qksms/presentation/build/outputs/apk -name "*.apk" -ls 2>/dev/null || true

      - name: Job summary — ApiX QKSMS (gateway)
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VCODE: ${{ steps.version.outputs.version_code }}
        run: |
          {
            echo "## 📱 ApiX QKSMS (gateway) — build summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version name** | \`$VERSION\` |"
            echo "| **Version code** | \`$VCODE\` |"
            echo "| **Project** | \`test/qksms/\` |"
            echo "| **Gradle task** | \`:presentation:assembleNoAnalyticsDebug\` |"
            echo "| **Variant** | \`noAnalytics\` **debug** |"
            echo "| **compileSdk** | 33 · **build-tools** 33.0.2 |"
            echo "| **JDK** | 17 (Eclipse Temurin) |"
            echo ""
            echo "### Output APKs"
          } >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          mapfile -t apks < <(find test/qksms/presentation/build/outputs/apk -name '*.apk' -type f 2>/dev/null | sort)
          if ((${#apks[@]})); then
            echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
            for f in "${apks[@]}"; do
              sz=$(du -h "$f" | cut -f1)
              echo "| \`$(basename "$f")\` | $sz |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "_No APK files found under \`test/qksms/presentation/build/outputs/apk\` (build may have failed)._ " >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo ""
            echo "### Artifact"
            echo "Workflow artifact: **apix-qksms-debug-${VERSION}** (\`presentation/.../noAnalytics/debug/*.apk\`)."
            echo ""
            echo "### Usage"
            echo "Install as default SMS app → drawer → **ApiX gateway** → server host/port and **Start relay**."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload QKSMS APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apix-qksms-debug-${{ steps.version.outputs.version }}
          path: test/qksms/presentation/build/outputs/apk/noAnalytics/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

  # ── GitHub Release (tag pushes only): Agent + QKSMS ─────────────────────
  release:
    name: Create GitHub Release
    needs: [build-client, build-qksms]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: apix-*
          path: release-apks
          merge-multiple: true

      - name: List release APKs
        run: find release-apks -name '*.apk' -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ApiX ${{ needs.build-client.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: release-apks/**/*.apk
          body: |
            ## ApiX ${{ needs.build-client.outputs.version }}

            ### APKs in this release
            - **ApiX Agent** — standalone SMS relay client (`ApiX-Agent-*.apk`)
            - **ApiX QKSMS** — QKSMS fork with drawer **ApiX gateway** (`ApiX-QKSMS-*.apk`, `noAnalytics` debug)

            ### ApiX Agent
            1. Download **ApiX-Agent-**…**.apk** (debug for testing, release when signed)
            2. Enable install from unknown sources, install, open **ApiX Agent**
            3. Point it at your gateway server

            ### ApiX QKSMS (gateway)
            1. Download **ApiX-QKSMS-**…**.apk** (default SMS app; use **noAnalytics** build)
            2. Install, set as default SMS app, open drawer → **ApiX gateway**
            3. Configure host/port (or **wss**), optional device / pairing token, **Start relay**

            ### Requirements
            - **Agent:** Android 5+ (API 21+) typical; see client `minSdk`
            - **QKSMS build:** Android 5+ (API 21+); **compileSdk 33**, **targetSdk 29** (`test/qksms`)

            **Version code:** ${{ needs.build-client.outputs.version_code }}
            **Build:** ${{ github.sha }}
